name: Send Daily Protein Reminders
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        run: curl -s -H "Title: Protein Tracker" -d "Log your protein today!" "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}-h$(date -u +%-H)"
