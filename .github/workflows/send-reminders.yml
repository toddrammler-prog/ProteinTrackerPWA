name: Send Daily Protein Reminders
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        env:
          TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          curl -d "Log your protein today!" "https://ntfy.sh/${TOPIC}-h$(date -u +%-H)"
